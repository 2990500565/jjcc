<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>久刺纹画</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .store-name {
            font-size: 2.8rem;
            font-weight: bold;
            color: #c9a96e;
            letter-spacing: 6px;
            margin-top: 30px;
        }
        .tagline {
            color: #a0a0a0;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }
        .intro {
            max-width: 500px;
            margin: 0 auto 30px;
            line-height: 1.8;
            color: #bbb;
        }
        .works {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .work-item {
            width: 100px;
            height: 100px;
            background-color: #1e1e1e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .contact p {
            margin: 8px 0;
            color: #ccc;
        }
        .btn {
            display: inline-block;
            background-color: #b5343a;
            color: #fff;
            padding: 12px 35px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin: 20px 0;
        }
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- 店名 -->
    <div class="store-name">惠城言刺青</div>
    <div class="tagline">以针为笔 · 镌刻永恒</div>

    <!-- 简介 -->
    <div class="intro">
        专注原创纹身设计，坚持一人一稿。<br>
        采用进口色料与一次性无菌针头，安全卫生。<br>
        风格涵盖传统、写实、水彩、几何等。
    </div>

    <!-- 作品展示（替换这里的表情符号即可） -->
    <div class="works">
        <div class="work-item">🌸</div>
        <div class="work-item">🐺</div>
        <div class="work-item">🌊</div>
        <div class="work-item">🔮</div>
    </div>

    <!-- 联系方式 -->
    <div class="contact">
        <p>📞 电话：181-4519-9187</p >
        <p>💬 微信：Tattoo-429</p >
        <p>📍 地址：惠州市惠城区风尚国际22j（预约制）</p >
        <p>🕐 营业时间：周一至周日 10:00-20:00</p >
    </div>

    <!-- 预约按钮 -->
    <a class="btn" href="https://work.weixin.qq.com/你的企业微信链接" target="_blank">立即预约咨询</a >

    <div class="footer">© 2025 久刺纹画</div>
</body>
</html>
